<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket Admin - Product Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles matching Figma "Brand Colors" [cite: 67] */
        :root {
            --brand-primary: #2563eb;
            --brand-secondary: #059669;
        }
    </style>
</head>

<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-blue-700 text-white shadow-lg p-4 mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">🛒 FreshMart Admin</h1>
            <span class="text-sm bg-blue-800 px-3 py-1 rounded-full">Product Dashboard</span>
        </div>
    </nav>

    <main class="container mx-auto px-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <section class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100 sticky top-4">
                    <h2 id="formTitle" class="text-xl font-semibold mb-4 text-gray-800 border-b pb-2">Add New Product
                    </h2>
                    <form id="productForm" class="space-y-4">
                        <input type="hidden" id="productId">

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Product Name *</label>
                            <input type="text" id="name" required
                                class="mt-1 block w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Price (RWF) *</label>
                                <input type="number" id="price" required min="0"
                                    class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Stock *</label>
                                <input type="number" id="stock" required min="0"
                                    class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Category *</label>
                            <select id="category" required
                                class="mt-1 block w-full border border-gray-300 rounded-md p-2">
                                <option value="">Select Category</option>
                                <option value="Beverages">Beverages</option>
                                <option value="Dairy">Dairy</option>
                                <option value="Snacks">Snacks</option>
                                <option value="Vegetables">Vegetables</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Description</label>
                            <textarea id="description" rows="2"
                                class="mt-1 block w-full border border-gray-300 rounded-md p-2"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700">Product Image [cite: 74]</label>
                            <input type="file" id="image" accept="image/*"
                                class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        </div>

                        <div class="pt-4 flex gap-2">
                            <button type="submit"
                                class="flex-1 bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition duration-200">Save
                                Product</button>
                            <button type="button" id="cancelBtn"
                                class="hidden bg-gray-200 text-gray-700 py-2 px-4 rounded-lg hover:bg-gray-300">Cancel</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="lg:col-span-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800">Inventory List</h2>
                    <select id="filterCategory" onchange="loadProducts()"
                        class="border border-gray-300 rounded-md p-2 text-sm">
                        <option value="">All Categories</option>
                        <option value="Beverages">Beverages</option>
                        <option value="Dairy">Dairy</option>
                        <option value="Snacks">Snacks</option>
                    </select>
                </div>

                <div id="productList" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
            </section>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 hidden transform transition-all duration-300 translate-y-10">
        <div id="toastMsg" class="px-6 py-3 rounded-lg shadow-xl text-white font-medium"></div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api/products"; // Adjust to your PORT from Part A [cite: 43]

        // --- Core Functions [cite: 74] ---

        // Load and Render Products
        async function loadProducts() {
            const category = document.getElementById('filterCategory').value;
            const url = category ? `${API_URL}?category=${category}` : API_URL;

            try {
                const res = await fetch(url);
                const products = await res.json();
                const list = document.getElementById('productList');

                list.innerHTML = products.map(p => `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition-shadow">
                        <img src="http://localhost:5000/uploads/${p.image}" 
                             onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'" 
                             class="h-48 w-full object-cover">
                        <div class="p-4">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="font-bold text-lg">${p.name}</h3>
                                <span class="px-2 py-1 text-xs font-semibold rounded-full ${p.stock > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${p.stock > 0 ? 'In Stock' : 'Out of Stock'}
                                </span>
                            </div>
                            <p class="text-sm text-gray-500 mb-2">${p.category}</p>
                            <p class="text-xl font-bold text-blue-700 mb-4">${p.price.toLocaleString()} RWF</p>
                            <div class="flex border-t pt-4 gap-4">
                                <button onclick="editProduct('${p._id}')" class="text-sm font-medium text-blue-600 hover:underline">Edit Details</button>
                                <button onclick="deleteProduct('${p._id}')" class="text-sm font-medium text-red-600 hover:underline">Remove</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                showToast("Failed to load products", "bg-red-600");
            }
        }

        // Create or Update Product [cite: 74]
        document.getElementById('productForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const formData = new FormData();

            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('stock', document.getElementById('stock').value);
            formData.append('description', document.getElementById('description').value);

            const imageFile = document.getElementById('image').files[0];
            if (imageFile) formData.append('image', imageFile);

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/${id}` : API_URL;

                const res = await fetch(url, { method, body: formData });

                if (res.ok) {
                    showToast(id ? "Product updated!" : "Product added!", "bg-green-600");
                    resetForm();
                    loadProducts();
                } else {
                    const error = await res.json();
                    showToast(error.message, "bg-red-600");
                }
            } catch (err) {
                showToast("Server error occurred", "bg-red-600");
            }
        };

        // Edit Mode: Pre-fill Form [cite: 74]
        async function editProduct(id) {
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const p = await res.json();

                document.getElementById('productId').value = p._id;
                document.getElementById('name').value = p.name;
                document.getElementById('price').value = p.price;
                document.getElementById('category').value = p.category;
                document.getElementById('stock').value = p.stock;
                document.getElementById('description').value = p.description;

                document.getElementById('formTitle').innerText = "Edit Product";
                document.getElementById('cancelBtn').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (err) {
                showToast("Could not fetch details", "bg-red-600");
            }
        }

        // Delete with Confirmation 
        async function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product? This cannot be undone.")) {
                try {
                    const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        showToast("Product deleted successfully", "bg-green-600");
                        loadProducts();
                    }
                } catch (err) {
                    showToast("Error deleting product", "bg-red-600");
                }
            }
        }

        // --- Helper Functions ---
        function showToast(msg, colorClass) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMsg');
            msgEl.className = `px-6 py-3 rounded-lg shadow-xl text-white font-medium ${colorClass}`;
            msgEl.innerText = msg;
            toast.classList.remove('hidden', 'translate-y-10');
            setTimeout(() => toast.classList.add('translate-y-10', 'hidden'), 3000);
        }

        function resetForm() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            document.getElementById('formTitle').innerText = "Add New Product";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        document.getElementById('cancelBtn').onclick = resetForm;

        // Initialize
        loadProducts();
    </script>
</body>

</html>
